name: run-tests.yml
on:
  workflow_dispatch:
  push:
    branches: [ create-teamcity-profile ]
  pull_request:

jobs:
  smoke:
    runs-on: ubuntu-latest
    env:
      TEAMCITY_DATA_TAG: teamcity-data
      TEAMCITY_DATA_ASSET: teamcity-data.tar.gz

    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'
          cache: maven

      - name: Download asset
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release download "$TEAMCITY_DATA_TAG" \
            --pattern "$TEAMCITY_DATA_ASSET" \
            --output "$TEAMCITY_DATA_ASSET"

      - name: Extract
        run: |
          tar -xzf "$TEAMCITY_DATA_ASSET" -C infra
          ls -la infra
          ls -la infra/teamcity-data

      - name: Fix permissions
        run: |
          sudo chown -R 1000:1000 infra/teamcity-data

      - name: Set env
        working-directory: ./infra
        run: cp .env.example .env

      - name: Start TeamCity
        working-directory: ./infra
        run: docker compose up -d

      - name: Wait for TeamCity
        run: |
          timeout 600 bash -c '
            until curl -fsS http://localhost:8111/mnt/get/currentState > /dev/null; do
              sleep 5
            done
          '

      - name: Check Java and Maven
        run: |
          java -version
          javac -version
          mvn -version

      - name: Run tests
        run: |
          mvn test -Pselenoid 

      - name: Upload test reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: maven-test-reports
          path: |
            target/surefire-reports
            target/failsafe-reports
            target/site
          if-no-files-found: ignore

      - name: Show TeamCity logs
        if: failure()
        working-directory: ./infra
        run: docker compose logs teamcity-server

      - name: Stop
        working-directory: ./infra
        if: always()
        run: docker compose down -v
