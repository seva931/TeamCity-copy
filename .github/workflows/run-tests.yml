name: run-tests

on:
  workflow_dispatch:
  push:
  pull_request:

jobs:
  smoke:
    runs-on: ubuntu-latest

    environment:
      name: github-pages

    permissions:
      contents: read
      pages: write
      id-token: write

    env:
      TEAMCITY_DATA_TAG: teamcity-data
      TEAMCITY_DATA_ASSET: teamcity-data.tar.gz

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"
          cache: maven

      - name: Cache Maven repository
        uses: actions/cache@v4
        with:
          path: ~/.m2/repository
          key: ${{ runner.os }}-maven-${{ hashFiles('**/pom.xml') }}
          restore-keys: |
            ${{ runner.os }}-maven-

      - name: Build code and run checkstyle
        run: mvn -B clean validate

      - name: Download TeamCity data asset
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release download "$TEAMCITY_DATA_TAG" \
            --pattern "$TEAMCITY_DATA_ASSET" \
            --output "$TEAMCITY_DATA_ASSET"

      - name: Extract TeamCity data
        run: |
          tar -xzf "$TEAMCITY_DATA_ASSET" -C infra
          ls -la infra
          ls -la infra/teamcity-data

      - name: Fix permissions
        run: |
          sudo chown -R 1000:1000 infra/teamcity-data

      - name: Set env
        working-directory: ./infra
        run: cp .env.example .env

      - name: Start services
        run: |
          cd infra
          bash restart_docker.sh selenoid
          cd ..

      - name: Wait for TeamCity
        run: |
          timeout 600 bash -c '
            until curl -fsS http://localhost:8111/login.html > /dev/null; do
              sleep 10
            done
          '

      - name: Clean Allure dirs
        run: |
          rm -rf allure-results target/site/allure-maven-plugin

      - name: Run API tests
        run: mvn -B test -Pselenoid -Dgroups=api

      - name: Run UI tests
        run: mvn -B test -Pselenoid -Dgroups=web

      - name: Generate Allure report
        if: always()
        run: mvn -B allure:report

      - name: Upload Allure artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: allure-artifacts
          path: |
            allure-results
            target/site/allure-maven-plugin
          if-no-files-found: ignore

      - name: Configure Pages
        if: always() && github.event_name != 'pull_request'
        uses: actions/configure-pages@v5

      - name: Upload Pages artifact
        if: always() && github.event_name != 'pull_request'
        uses: actions/upload-pages-artifact@v3
        with:
          path: target/site/allure-maven-plugin

      - name: Deploy to GitHub Pages
        if: always() && github.event_name != 'pull_request'
        uses: actions/deploy-pages@v4

      - name: Stop services
        if: always()
        working-directory: ./infra
        run: docker compose down -v