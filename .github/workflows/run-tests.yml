name: run-tests

on:
  workflow_dispatch:
  push:
    branches:
      - api-tests-project-management
  pull_request:

permissions:
  contents: write

jobs:
  smoke:
    runs-on: ubuntu-latest

    env:
      TEAMCITY_DATA_URL: ${{ vars.TEAMCITY_DATA_URL }}

    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'
          cache: maven

      - name: Make scripts executable
        run: chmod +x infra/scripts/*.sh

      - name: Restore TeamCity data
        working-directory: ./infra
        run: ./scripts/restore-teamcity-data.sh "$TEAMCITY_DATA_URL"

      - name: Set env
        working-directory: ./infra
        run: cp .env.example .env

      - name: Start services
        working-directory: ./infra
        run: bash restart_docker.sh selenoid

      - name: Wait for TeamCity
        run: |
          timeout 600 bash -c '
            until curl -fsS http://localhost:8111/login.html > /dev/null; do
              sleep 10
            done
          '

      - name: Check Selenoid
        run: curl -fsS http://localhost:4444/status

      - name: Run tests
        run: mvn clean test -Pselenoid

      - name: Upload allure results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: allure-results
          path: allure-results
          if-no-files-found: ignore

      - name: Upload test reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: maven-test-reports
          path: |
            target/surefire-reports
            target/failsafe-reports
            target/site
          if-no-files-found: ignore

      - name: Show TeamCity logs
        if: failure()
        working-directory: ./infra
        run: docker compose logs teamcity-server

      - name: Stop services
        if: always()
        working-directory: ./infra
        run: docker compose down -v

  publish-allure:
    needs: smoke
    if: ${{ always() && github.event_name != 'pull_request' }}
    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'
          cache: maven

      - name: Download allure results
        uses: actions/download-artifact@v4
        with:
          name: allure-results
          path: allure-results

      - name: Generate Allure report
        run: mvn allure:report

      - name: Publish to gh-pages
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          mkdir -p .publish
          cp -R target/site/allure-maven-plugin/* .publish/
          touch .publish/.nojekyll

          git checkout --orphan gh-pages-temp
          git rm -rf . || true
          cp -R .publish/* .
          git add .
          git commit -m "Publish Allure report for ${GITHUB_SHA}"
          git push origin HEAD:gh-pages --force