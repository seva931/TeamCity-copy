name: run-tests

on:
  workflow_dispatch:
  push:
    branches:
      - api-tests-project-management
  pull_request:

permissions:
  contents: write

jobs:
  smoke:
    runs-on: ubuntu-latest

    env:
      TEAMCITY_DATA_TAG: teamcity-data
      TEAMCITY_DATA_ASSET: teamcity-data.tar.gz

    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'
          cache: maven

      - name: Download TeamCity data asset
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release download "$TEAMCITY_DATA_TAG" \
            --repo seva931/TeamCity \
            --pattern "$TEAMCITY_DATA_ASSET" \
            --output "$TEAMCITY_DATA_ASSET"

      - name: Extract TeamCity data
        run: |
          tar -xzf "$TEAMCITY_DATA_ASSET" -C infra
          ls -la infra
          ls -la infra/teamcity-data

      - name: Fix permissions
        run: |
          sudo chown -R 1000:1000 infra/teamcity-data

      - name: Set env
        working-directory: ./infra
        run: cp .env.example .env

      - name: Start services
        working-directory: ./infra
        run: bash restart_docker.sh selenoid

      - name: Wait for TeamCity
        run: |
          timeout 600 bash -c '
            until curl -fsS http://localhost:8111/login.html > /dev/null; do
              sleep 10
            done
          '

      - name: Check Selenoid
        run: curl -fsS http://localhost:4444/status

      - name: Run tests
        run: mvn clean test -Pselenoid

      - name: Generate Allure report
        if: always()
        run: mvn allure:report

      - name: Upload Allure artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: allure-artifacts
          path: |
            allure-results
            target/site/allure-maven-plugin
          if-no-files-found: ignore

      - name: Upload test reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: maven-test-reports
          path: |
            target/surefire-reports
            target/failsafe-reports
            target/site
          if-no-files-found: ignore

      - name: Publish to gh-pages
        if: always() && github.event_name != 'pull_request'
        run: |
          if [ ! -d "target/site/allure-maven-plugin" ]; then
            echo "Allure report directory not found, skip publish"
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          mkdir -p .publish
          cp -R target/site/allure-maven-plugin/* .publish/
          touch .publish/.nojekyll

          git checkout --orphan gh-pages-temp
          git rm -rf . || true
          cp -R .publish/* .
          git add .
          git commit -m "Publish Allure report for ${GITHUB_SHA}" || echo "Nothing to commit"
          git push origin HEAD:gh-pages --force

      - name: Show TeamCity logs
        if: failure()
        working-directory: ./infra
        run: docker compose logs teamcity-server

      - name: Stop services
        if: always()
        working-directory: ./infra
        run: docker compose down -v